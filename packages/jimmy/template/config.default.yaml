jinn:
  version: "0.3.0"

gateway:
  port: 7777
  host: "127.0.0.1"

engines:
  default: claude
  claude:
    bin: claude
    model: opus
    effortLevel: medium
  codex:
    bin: codex
    model: gpt-5.4
    effortLevel: high

connectors:
  slack:
    shareSessionInChannel: false
    ignoreOldMessagesOnBoot: true
    # 空気読み（air-reading）トリアージ層
    # 有効化すると、Slack受信メッセージごとに軽量LLMで
    # silent/react/replyを判定し、不要な反応を抑制する。
    # triage:
    #   enabled: true
    #   model: claude-haiku-4-5
    #   timeoutMs: 20000
    #   threadContextLimit: 10

# MCPサーバーは従業員にブラウザ・検索・メッセージング機能を提供する。
# Claude Codeセッションに --mcp-config 経由で自動注入される。
mcp:
  browser:
    enabled: true
    provider: playwright   # または "puppeteer"
  search:
    enabled: false         # trueにしてapiKeyを指定するかBRAVE_API_KEY環境変数をセット
    provider: brave
    # apiKey: ${BRAVE_API_KEY}
  fetch:
    enabled: true
  gateway:
    enabled: true          # メッセージング・組織・cron・セッション用の内蔵MCPサーバー
  # custom:
  #   my-server:
  #     enabled: true
  #     command: npx
  #     args: ["-y", "@my/mcp-server"]
  #     env:
  #       API_KEY: ${MY_API_KEY}

# セッション上限（従業員ごとにYAMLで上書き可）
sessions:
  maxDurationMinutes: 30
  maxCostUsd: 10.00

# Cron設定
cron:
  # alertConnector: slack
  # alertChannel: "#alerts"

portal:
  portalName: Ryoko
  language: Japanese

logging:
  file: true
  stdout: true
  level: info
